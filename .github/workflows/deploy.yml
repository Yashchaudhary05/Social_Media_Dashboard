name: CI/CD — Build, Test & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ── Lint & Validate ──────────────────────────────────
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          sudo apt-get install -y tidy > /dev/null 2>&1
          tidy -q -e index.html || true
          # fail only on outright parse errors (exit code 2)
          tidy -q -e index.html; EC=$?; [ "$EC" -lt 2 ]

      - name: Validate JSON data
        run: python3 -c "import json; json.load(open('data.json'))"

      - name: Check file structure
        run: |
          echo "=== Checking required files exist ==="
          for f in index.html style.css script.js data.json; do
            test -f "$f" && echo "✓ $f" || (echo "✗ $f MISSING" && exit 1)
          done

  # ── Build Docker image (validates Dockerfile) ───────
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: social-media-dashboard:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to GitHub Pages ──────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
